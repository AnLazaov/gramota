<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Универсален Генератор на Грамоти - Фикс Печат и Цветове</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&family=Kelly+Slab&family=Tenor+Sans&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Дефиниране на оригиналния златен градиент */
            --gold-grad: linear-gradient(135deg, #cfb07e 0%, #a67c00 50%, #5d461a 100%);
            /* По подразбиране заглавието използва златния градиент */
            --title-color: transparent;
            --title-bg: var(--gold-grad);
            --title-clip: text;
            --name-color: #b21f1f;
        }

        /* Настройки за самия лист при печат - ТОЧЕН ФОРМАТ А4 */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        body { 
            background: #2c2c2c; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            font-family: 'Tenor Sans', sans-serif;
            -webkit-print-color-adjust: exact; /* Важно за цветовете при печат */
            print-color-adjust: exact;
        }

        /* КОНТРОЛЕН ПАНЕЛ - СКРИТ ПРИ ПЕЧАТ */
        #admin-panel {
            background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; align-items: flex-end;
            position: sticky; top: 10px; /* Панелът се движи при скролване */
        }
        .tool-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; font-weight: bold; color: #777; text-transform: uppercase; }
        select, input, button { padding: 6px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        
        button.print-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; font-weight: bold; }
        button.print-btn:hover { background: #2ecc71; }
        
        button.reset-btn { background: #f1c40f; color: #333; border: none; padding: 6px 10px; font-size: 11px; font-weight: bold; margin-left: 5px; }

        /* ГРАМОТА - ТОЧЕН ФОРМАТ А4 */
        .cert-canvas {
            width: 297mm;
            height: 210mm;
            background: #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
            page-break-after: always;
        }

        /* CSS РАМКИ */
        .frame-classic { border: 12mm solid; border-image: linear-gradient(45deg, #a67c00, #cfb07e, #5d461a) 1; padding: 5mm; }
        .frame-classic::after { content: ''; position: absolute; top: 10mm; left: 10mm; right: 10mm; bottom: 10mm; border: 2px solid #a67c00; pointer-events: none; }
        
        .frame-modern { border: 15mm solid #2c3e50; }
        .frame-modern::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 3mm solid #a67c00; box-sizing: border-box; pointer-events: none; }
        
        .frame-art { border: 1px solid #eee; }
        .frame-art::before { content: ''; position: absolute; top: 10mm; left: 10mm; width: 20mm; height: 20mm; border-top: 4px solid #a67c00; border-left: 4px solid #a67c00; pointer-events: none; }
        .frame-art::after { content: ''; position: absolute; bottom: 10mm; right: 10mm; width: 20mm; height: 20mm; border-bottom: 4px solid #a67c00; border-right: 4px solid #a67c00; pointer-events: none; }

        .frame-none { border: none; }

        .content {
            width: 80%;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            z-index: 10;
        }

        /* ТИПОГРАФИЯ - ДИНАМИЧНИ ЦВЕТОВЕ */
        .title {
            font-family: 'Cinzel', serif; font-size: 100px; margin: 0;
            
            /* Използване на променливите за цвят и градиент */
            color: var(--title-color);
            background: var(--title-bg);
            -webkit-background-clip: var(--title-clip);
            background-clip: var(--title-clip);
            -webkit-text-fill-color: var(--title-color);
            
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.15));
            letter-spacing: 12px;
            text-transform: uppercase;
            outline: none;
        }

        .subtitle { font-family: 'Playfair Display', serif; font-size: 30px; font-style: italic; color: #444; margin: 0; outline: none; }

        .student-name {
            font-family: 'Kelly Slab', serif; 
            font-size: 85px; 
            color: var(--name-color);
            margin: 10px 0; outline: none; min-width: 650px; display: inline-block;
        }

        .label-style { font-family: 'Tenor Sans', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #999; }
        .reason { font-family: 'Tenor Sans', sans-serif; font-size: 24px; line-height: 1.5; color: #333; padding: 0 20px; outline: none; }

        /* ФУТЪР - ОПРАВЕНО ПОЛОЖЕНИЕ И ОТСТЪПИ */
        .footer { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; padding-bottom: 10mm; }
        .sign-block { width: 250px; border-top: 1px solid #a67c00; padding-top: 8px; }
        
        #logo-slot { width: 130px; height: 130px; display: flex; justify-content: center; align-items: center; }
        #logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Специфични корекции при печат - СКРИВАНЕ НА ПАНЕЛА */
        @media print {
            body { background: none; padding: 0; }
            #admin-panel { display: none; }
            .cert-canvas { 
                box-shadow: none; 
                margin: 0;
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="tool-group">
            <label>🖼️ Рамка</label>
            <select onchange="updateFrame(this.value)">
                <option value="frame-classic">Златна Класик</option>
                <option value="frame-modern">Модерна Тъмна</option>
                <option value="frame-art">Арт Минимум</option>
                <option value="frame-none">Без рамка</option>
            </select>
        </div>

        <div class="tool-group">
            <label>🖋️ Шрифт Име</label>
            <select onchange="updateNameFont(this.value)">
                <option value="'Kelly Slab', serif">Технически (Kelly Slab)</option>
                <option value="'Tenor Sans', sans-serif">Благороден (Tenor Sans)</option>
                <option value="'Comfortaa', cursive">Геометричен (Comfortaa)</option>
                <option value="'Cinzel', serif">Величествен (Cinzel)</option>
            </select>
        </div>
        
        <div class="tool-group">
            <label>🎨 Цвят Грамота</label>
            <div style="display:flex; align-items:center;">
                <input type="color" value="#a67c00" onchange="updateTitleColor(this.value)" id="titleColorPicker">
                <button class="reset-btn" onclick="resetTitleColor()">✨ Златно</button>
            </div>
        </div>

        <div class="tool-group">
            <label>🎨 Цвят Име</label>
            <input type="color" value="#b21f1f" onchange="updateNameColor(this.value)">
        </div>

        <div class="tool-group">
            <label>🛡️ Лого / Печат</label>
            <div style="display:flex; gap:5px;">
                <input type="file" accept="image/*" onchange="loadLogo(event)" style="width:130px;">
                <button onclick="document.getElementById('logo-img').style.display='none'">❌</button>
            </div>
        </div>

        <button onclick="window.print()" class="print-btn">🖨️ ПЕЧАТ (A4)</button>
    </div>

    <div class="cert-canvas frame-classic" id="certPage">
        <div class="content">
            <div>
                <h1 class="title" contenteditable="true">ГРАМОТА</h1>
                <div class="subtitle" contenteditable="true">за изключителни постижения</div>
            </div>

            <div>
                <div class="label-style">присъжда се на</div>
                <div class="student-name" id="nameBox" contenteditable="true">Име и Фамилия</div>
            </div>

            <div class="reason" contenteditable="true">
                за показани завидни знания и бърза мисъл <br>
                в гпроведеното състезание
            </div>

            <div class="footer">
                <div class="sign-block">
                    <div style="font-size: 20px;" contenteditable="true">25.03.2026 г.</div>
                    <div class="label-style" style="font-size: 10px;">Дата</div>
                </div>

                <div id="logo-slot">
                    <img src="https://i.imgur.com/rN2w9uX.png" id="logo-img">
                </div>

                <div class="sign-block">
                    <div style="font-size: 20px;" contenteditable="true">Име Фамилия</div>
                    <div class="label-style" style="font-size: 10px;">Преподавател</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateFrame(f) { document.getElementById('certPage').className = 'cert-canvas ' + f; }
        function updateNameFont(f) { document.getElementById('nameBox').style.fontFamily = f; }
        function updateNameColor(c) { document.documentElement.style.setProperty('--name-color', c); }
        
        // Функции за промяна на цвета на заглавието "ГРАМОТА"
        function updateTitleColor(c) {
            const root = document.documentElement;
            root.style.setProperty('--title-color', c);
            root.style.setProperty('--title-bg', 'none'); // Премахва градиента
            root.style.setProperty('--title-clip', 'initial'); // Премахва клипването
            
            // За браузъри, които изискват -webkit- префикс
            document.querySelector('.title').style.webkitTextFillColor = c;
        }
        
        // Функция за връщане на златния релефен ефект
        function resetTitleColor() {
            const root = document.documentElement;
            // Връща оригиналните CSS променливи
            root.style.setProperty('--title-color', 'transparent');
            root.style.setProperty('--title-bg', 'var(--gold-grad)');
            root.style.setProperty('--title-clip', 'text');
            
            // Нулира избора в палитрата
            document.getElementById('titleColorPicker').value = '#a67c00';
            
            // Връща -webkit- настройките
            document.querySelector('.title').style.webkitTextFillColor = 'transparent';
        }

        function loadLogo(e) {
            const r = new FileReader();
            r.onload = function(){
                const out = document.getElementById('logo-img');
                out.src = r.result;
                out.style.display = 'block';
            };
            r.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
